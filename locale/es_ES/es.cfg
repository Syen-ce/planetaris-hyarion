[tips-and-tricks-item-description]
hyarion-briefing=[planet=hyarion] Un planeta de cristal y lava, Rayos refractales caen del cielo destruyendo la superficie.\nEs posible eliminar materiales tirándolos directamente a [tile=lava].
hyarion-refraction=[planet=hyarion] tienen una forma única de generar energia.\nUsa [entity=planetaris-big-refraction-ray-collector] para recolectar [fluid=planetaris-refraction-light], luego moverla con [entity=planetaris-fiber-optics-cable] a una [entity=planetaris-refraction-plant].\nDentro [item=planetaris-fluorite] y [fluid=planetaris-refraction-light] produce [fluid=planetaris-pure-light] utilizalo para generar energia en un [entity=planetaris-refraction-generator]\nTambién, puedes producir [item=planetaris-charged-fluorite] para mover tu energia de refracción a cualquier lado.
hyarion-unstable-gem=[item=planetaris-unstable-gem] is a better option than [item=cliff-explosives] with a bigger range and damage.

